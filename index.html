<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Daniela 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:'Playfair Display',serif;
  overflow:hidden;
}

/* estrellas */
.star{
  position:fixed;
  width:2px;
  height:2px;
  background:#d6d6d6;
  animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
  from{opacity:.2}
  to{opacity:.8}
}

/* pantallas */
.screen{
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  opacity:0;
  transition:1s;
}
.active{display:flex;opacity:1;}

h2{color:#444}

/* teclado */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}
.key{
  background:#e0e0e0;
  color:#333;
  border:none;
  padding:18px;
  border-radius:12px;
  font-size:20px;
}

/* carta */
.notepad{
  background:#fff;
  border:1px solid #ddd;
  padding:25px;
  border-radius:18px;
  max-width:500px;
  width:90%;
  color:#333;
}

/* nombre */
.name{
  text-align:center;
  font-size:32px;
  margin-bottom:15px;
  color:#555;
}

/* texto */
.typing{
  line-height:1.6;
}

/* corazones */
.heart{
  position:fixed;
  color:#aaa;
  animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
  to{transform:translateY(-150px);opacity:0;}
}

/* lirios más bonitos */
.lily{
  position:fixed;
  bottom:-50px;
  width:20px;
  height:20px;
  background:#ffffff;
  border-radius:50% 50% 0 50%;
  transform:rotate(45deg);
  opacity:0.8;
  animation:grow 4s forwards;
}
.lily::after{
  content:'';
  position:absolute;
  width:20px;
  height:20px;
  background:#ffffff;
  border-radius:50% 50% 0 50%;
  transform:rotate(-90deg);
}

@keyframes grow{
  to{
    transform:translateY(-250px) scale(1.5);
    opacity:1;
  }
}

/* mensaje */
.love{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#777;
}
</style>
</head>

<body>

<!-- audio REAL -->
<audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3e6d6c0e9f.mp3" type="audio/mpeg">
</audio>

<!-- contraseña -->
<div id="pass" class="screen active">
<h2>🔒 Ingresa la contraseña</h2>
<div id="display">••••</div>

<div class="keypad">
<button class="key" onclick="p('1')">1</button>
<button class="key" onclick="p('2')">2</button>
<button class="key" onclick="p('3')">3</button>
<button class="key" onclick="p('4')">4</button>
<button class="key" onclick="p('5')">5</button>
<button class="key" onclick="p('6')">6</button>
<button class="key" onclick="p('7')">7</button>
<button class="key" onclick="p('8')">8</button>
<button class="key" onclick="p('9')">9</button>
<div></div>
<button class="key" onclick="p('0')">0</button>
<div></div>
</div>
</div>

<!-- carta -->
<div id="carta" class="screen">
<div class="notepad">

<div class="name">Daniela 🤍</div>
<div id="texto" class="typing"></div>

</div>
</div>

<div class="love">Te quiero muchísimo Daniela 🤍</div>

<script>
let pass='0110',input='';

function p(n){
 if(input.length<4) input+=n;
 document.getElementById('display').innerText=input.padEnd(4,'•');

 if(input.length===4){
  if(input===pass){

    document.getElementById('pass').classList.remove('active');
    document.getElementById('carta').classList.add('active');

    // 🎶 reproducir música (ya permitido por interacción)
    document.getElementById("audio").play();

    escribir();

  }else{
    alert("Contraseña incorrecta");
    input='';
    document.getElementById('display').innerText='••••';
  }
 }
}

/* texto */
const msg=`Desde que llegaste a mi vida, todo cambió…

Contigo todo se siente más bonito,
más tranquilo… más real.

Me gusta estar contigo,
pensar en ti…

porque contigo todo se siente en paz.

Eres alguien muy especial para mí, Daniela…

y no dejo de pensar en ti 🤍

Te quiero muchísimo 🤍`;

let i=0;
function escribir(){
 let el=document.getElementById("texto");

 let inter=setInterval(()=>{
  el.innerHTML += msg[i] === "\n" ? "<br>" : msg[i];
  i++;

  if(i>=msg.length){
    clearInterval(inter);
    lirios();
  }

 },35);
}

/* lirios */
function lirios(){
 for(let i=0;i<10;i++){
  let l=document.createElement("div");
  l.className="lily";
  l.style.left=Math.random()*100+"vw";
  document.body.appendChild(l);
 }
}

/* corazones */
document.addEventListener("click",e=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="🤍";
 h.style.left=e.clientX+"px";
 h.style.top=e.clientY+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),2000);
});

/* estrellas */
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}
</script>

</body>
</html>
