<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Daniela 🤍</title>

<style>
body{
  margin:0;
  background:black;
  font-family:'Georgia',serif;
  overflow:hidden;
}

/* estrellas */
.star{
  position:fixed;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:.2}
  to{opacity:1}
}

/* pantallas */
.screen{
  display:none;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  opacity:0;
  transition:1s;
}
.active{display:flex;opacity:1;}

h2{color:white}

/* teclado */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}
.key{
  background:#333;
  color:white;
  border:none;
  padding:18px;
  border-radius:12px;
  font-size:20px;
}
.key:hover{background:#555}

/* carta */
.notepad{
  background:#111;
  border:1px solid #888;
  padding:25px;
  border-radius:18px;
  max-width:500px;
  width:90%;
  color:white;
}

.name{
  text-align:center;
  font-size:30px;
  margin-bottom:10px;
  animation:glow 2s infinite alternate;
}
@keyframes glow{
  from{opacity:.5}
  to{opacity:1}
}

.typing{
  white-space:pre-line;
}

/* corazones */
.heart{
  position:fixed;
  color:white;
  animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
  to{transform:translateY(-150px);opacity:0;}
}

/* mensaje */
.love{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  color:white;
  animation:fade 3s infinite alternate;
}
@keyframes fade{
  from{opacity:.3}
  to{opacity:1}
}
</style>
</head>

<body>

<!-- música -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/6kUnyWqZzA8?loop=1&playlist=6kUnyWqZzA8"
allow="autoplay"></iframe>

<!-- pantalla -->
<div id="pass" class="screen active">
<h2>🔒 Ingresa la contraseña</h2>
<div id="display">••••</div>

<div class="keypad">
<button class="key" onclick="p('1')">1</button>
<button class="key" onclick="p('2')">2</button>
<button class="key" onclick="p('3')">3</button>
<button class="key" onclick="p('4')">4</button>
<button class="key" onclick="p('5')">5</button>
<button class="key" onclick="p('6')">6</button>
<button class="key" onclick="p('7')">7</button>
<button class="key" onclick="p('8')">8</button>
<button class="key" onclick="p('9')">9</button>
<div></div>
<button class="key" onclick="p('0')">0</button>
<div></div>
</div>
</div>

<!-- carta -->
<div id="carta" class="screen">
<div class="notepad">

<div class="name">Daniela 🤍</div>

<div id="texto" class="typing"></div>

</div>
</div>

<div class="love">Te amo Daniela 🤍</div>

<script>
let pass='0110',input='';

function p(n){
 if(input.length<4) input+=n;
 document.getElementById('display').innerText=input.padEnd(4,'•');

 if(input.length===4){
  if(input===pass){

    document.getElementById('pass').classList.remove('active');
    document.getElementById('carta').classList.add('active');

    document.getElementById("music").src+="&autoplay=1";

    navigator.vibrate?.(200);

    escribir();

  }else{
    alert("Contraseña incorrecta");
    input='';
    document.getElementById('display').innerText='••••';
  }
 }
}

/* texto */
const msg=`Desde que llegaste a mi vida, todo cambió…

Contigo todo se siente más bonito,
más tranquilo… más real.

Me gusta estar contigo,
pensar en ti…

porque contigo todo se siente en paz.

Eres alguien muy especial para mí, Daniela…

y no dejo de pensar en ti 🤍

Te quiero muchísimo 🤍`;

let i=0;
function escribir(){
 let el=document.getElementById("texto");
 let inter=setInterval(()=>{
  el.innerText+=msg[i];
  i++;
  if(i>=msg.length) clearInterval(inter);
 },40);
}

/* corazones */
document.addEventListener("click",e=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="🤍";
 h.style.left=e.clientX+"px";
 h.style.top=e.clientY+"px";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),2000);
});

/* estrellas */
for(let i=0;i<100;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}
</script>

</body>
</html>
